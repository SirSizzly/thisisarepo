let current = 0;

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = chapters.map((ch, i) =>
    `<button class="${i === current ? 'active' : ''}" onclick="show(${i})">Ch ${ch.num}</button>`
  ).join('');
}

function renderChapters() {
  const container = document.getElementById('chapters');
  container.innerHTML = chapters.map((ch, i) => `
    <div class="chapter ${i === current ? 'active' : ''}" id="ch${i}">
      <div class="ch-header">
        <span class="ch-num">Chapter ${ch.num}</span>
        <span class="ch-title">${ch.title}</span>
      </div>
      <div class="summary-box">${ch.summary}</div>
      <div class="section-label">Key points</div>
      <ul class="points">
        ${ch.points.map(p => `<li>${p}</li>`).join('')}
      </ul>
      <div class="section-label">Rules & principles</div>
      <div class="rules">
        ${ch.rules.map(r => `<div class="rule-card"><strong>${r.title}</strong><span>${r.desc}</span></div>`).join('')}
      </div>
      <div class="nav-footer">
        <button onclick="show(${i-1})" ${i===0?'style="visibility:hidden"':''}>← Previous</button>
        <button onclick="show(${i+1})" ${i===chapters.length-1?'style="visibility:hidden"':''}>Next →</button>
      </div>
    </div>
  `).join('');
}

function show(i) {
  if (i < 0 || i >= chapters.length) return;
  current = i;
  document.querySelectorAll('.chapter').forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
  });
  document.querySelectorAll('.nav button').forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
  });
  window.scrollTo(0, 0);
}

renderNav();
renderChapters();
</script>
